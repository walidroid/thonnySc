name: Build Thonny Installer

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
        
    - name: Generate version number
      id: version
      run: |
        $date = Get-Date
        $version = "$($date.Year).$($date.Month).$($date.Day).${{ github.run_number }}"
        "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Host "Generated version: $version"
        
    - name: Run Build Script
      run: |
        .\build.ps1 -Version "${{ steps.version.outputs.VERSION }}"
        
    - name: List output directory
      run: |
        if (Test-Path "output") { dir output }
        
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: ThonnySc-Installer-v${{ steps.version.outputs.VERSION }}
        path: output/*.exe
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: ThonnySc v${{ steps.version.outputs.VERSION }}
        body: |
          ## ThonnySc Installer
          
          **Version:** ${{ steps.version.outputs.VERSION }}
          **Build Date:** ${{ github.event.head_commit.timestamp }}
          **Commit:** ${{ github.sha }}
          
          ### Installation
          1. Download the executable below
          2. Run the installer
          3. Desktop shortcuts will be created automatically
        files: output/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

